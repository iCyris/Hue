<section data-demo="image">
  <style>
    [data-demo="image"] { margin: 0; }
    [data-demo="image"] .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s3);
      padding: var(--s2) 0;
    }
    [data-demo="image"] .shot {
      display: block;
      max-width: 100%;
      padding: var(--s2);
      border: 0;
      border-radius: var(--r2);
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border);
      cursor: zoom-in;
      transition: transform var(--dur-1) var(--ease-out), box-shadow var(--dur-1) var(--ease-out);
    }
    [data-demo="image"] .shot:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px var(--border), 0 1px 2px rgba(27, 27, 24, .04), 0 4px 24px rgba(27, 27, 24, .05);
    }
    [data-demo="image"] .thumb {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      border-radius: var(--r1);
    }
    [data-demo="image"] .caption {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--ink-3);
    }
    [data-demo="image"] .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s6);
      background: rgba(27, 27, 24, .28);
      animation: image-fade var(--dur-2) var(--ease-out);
    }
    [data-demo="image"] .overlay[hidden] { display: none; }
    @keyframes image-fade {
      from { opacity: 0; }
    }
    [data-demo="image"] .zoomed {
      display: block;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: zoom-out;
      animation: image-in var(--dur-2) var(--ease-out);
    }
    @keyframes image-in {
      from { opacity: 0; transform: scale(.96); }
    }
    [data-demo="image"] .full {
      display: block;
      max-width: calc(100vw - var(--s6) * 2);
      max-height: calc(100vh - var(--s6) * 2);
      border-radius: var(--r2);
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border), 0 1px 2px rgba(27, 27, 24, .04), 0 4px 24px rgba(27, 27, 24, .05);
    }
  </style>

  <script>
    (function () {
      var root = document.currentScript.closest('[data-demo="image"]');
      var shot = root.querySelector('.shot');
      var thumb = root.querySelector('.thumb');
      var overlay = root.querySelector('.overlay');
      var zoomed = root.querySelector('.zoomed');
      var full = root.querySelector('.full');

      function openImage() {
        full.src = thumb.currentSrc || thumb.src;
        full.alt = thumb.alt;
        overlay.hidden = false;
        zoomed.focus();
      }

      function closeImage() {
        overlay.hidden = true;
        full.removeAttribute('src');
        shot.focus();
      }

      shot.addEventListener('click', openImage);
      zoomed.addEventListener('click', closeImage);
      overlay.addEventListener('click', function (event) {
        if (event.target === overlay) { closeImage(); }
      });
      overlay.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') { closeImage(); }
      });
    })();
  </script>
