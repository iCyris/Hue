<section data-demo="stepper">
  <style>
    [data-demo="stepper"] { margin-top: 0; }
    [data-demo="stepper"] [hidden] { display: none !important; }
    [data-demo="stepper"] .steps {
      display: flex;
      align-items: flex-start;
      gap: var(--s2);
      max-width: 360px;
      margin: 0 auto;
    }
    [data-demo="stepper"] .cell {
      flex: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s1);
      min-width: var(--s6);
    }
    [data-demo="stepper"] .step {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--s5);
      height: var(--s5);
      border-radius: var(--r3);
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border);
      color: var(--ink-3);
      font-size: 12.5px;
      font-weight: 500;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }
    [data-demo="stepper"] .cell.is-current .step {
      box-shadow: 0 0 0 1px var(--accent);
      color: var(--accent);
    }
    [data-demo="stepper"] .cell.is-done .step {
      background: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
      color: var(--surface);
    }
    [data-demo="stepper"] .num { display: block; }
    [data-demo="stepper"] .check {
      display: none;
      width: 9px;
      height: 5px;
      border-left: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg) translateY(-1px);
    }
    [data-demo="stepper"] .cell.is-done .num { display: none; }
    [data-demo="stepper"] .cell.is-done .check { display: block; }
    [data-demo="stepper"] .step-label {
      font-size: 12.5px;
      line-height: 1.4;
      color: var(--ink-3);
      white-space: nowrap;
    }
    [data-demo="stepper"] .cell.is-current .step-label {
      color: var(--ink);
      font-weight: 500;
    }
    [data-demo="stepper"] .line {
      flex: 1;
      height: 1px;
      margin-top: var(--s3);
      background: var(--border);
    }
    [data-demo="stepper"] .foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s3);
      margin-top: var(--s5);
    }
    [data-demo="stepper"] .status-count {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--ink-3);
      font-variant-numeric: tabular-nums;
    }
    [data-demo="stepper"] .actions {
      flex: none;
      display: flex;
      gap: var(--s2);
    }
    [data-demo="stepper"] .btn {
      height: 32px;
      padding: 0 var(--s3);
      border: 0;
      border-radius: var(--r1);
      background: none;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.4;
    }
    [data-demo="stepper"] .next {
      background: var(--accent);
      color: var(--surface);
    }
    [data-demo="stepper"] .next:hover { background: var(--accent-strong); }
    [data-demo="stepper"] .back {
      background: transparent;
      box-shadow: inset 0 0 0 1px var(--border);
      color: var(--ink);
    }
    [data-demo="stepper"] .back:hover:not(:disabled) { background: var(--sand); }
    [data-demo="stepper"] .back:disabled { opacity: 0.45; cursor: default; }
    [data-demo="stepper"] .done {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--s5);
    }
    [data-demo="stepper"] .done-text {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
      color: var(--ink-3);
    }
    [data-demo="stepper"] .restart {
      color: var(--accent);
      text-decoration-line: underline;
      text-decoration-color: transparent;
      text-decoration-thickness: 1px;
      text-underline-offset: var(--s1);
      transition: color var(--dur-1) var(--ease-out), text-decoration-color var(--dur-1) var(--ease-out);
    }
    [data-demo="stepper"] .restart:hover {
      color: var(--accent-strong);
      text-decoration-color: currentColor;
    }
  </style>
  <div class="stage">
    <div class="steps" aria-hidden="true">
      <div class="cell is-current">
        <span class="step"><span class="num">1</span><span class="check"></span></span>
        <span class="step-label">Account</span>
      </div>
      <span class="line"></span>
      <div class="cell">
        <span class="step"><span class="num">2</span><span class="check"></span></span>
        <span class="step-label">Details</span>
      </div>
      <span class="line"></span>
      <div class="cell">
        <span class="step"><span class="num">3</span><span class="check"></span></span>
        <span class="step-label">Review</span>
      </div>
    </div>
    <div class="foot">
      <p class="status-count">Step 1 of 3</p>
      <div class="actions">
        <button class="btn back" type="button" disabled>Back</button>
        <button class="btn next" type="button">Continue</button>
      </div>
    </div>
    <div class="done" hidden>
      <p class="done-text">All steps complete.</p>
      <button class="btn restart" type="button">Restart</button>
    </div>
  </div>
  <script>
    (function () {
      var root = document.currentScript.closest('[data-demo="stepper"]');
      var cells = Array.prototype.slice.call(root.querySelectorAll('.cell'));
      var count = root.querySelector('.status-count');
      var foot = root.querySelector('.foot');
      var done = root.querySelector('.done');
      var back = root.querySelector('.back');
      var next = root.querySelector('.next');
      var restart = root.querySelector('.restart');
      var current = 0;

      function render() {
        cells.forEach(function (cell, i) {
          cell.classList.toggle('is-done', i < current);
          cell.classList.toggle('is-current', i === current);
        });
        count.textContent = 'Step ' + (current + 1) + ' of ' + cells.length;
        back.disabled = current === 0;
        next.textContent = current === cells.length - 1 ? 'Finish' : 'Continue';
      }

      next.addEventListener('click', function () {
        if (current < cells.length - 1) {
          current += 1;
          render();
          return;
        }
        cells.forEach(function (cell) {
          cell.classList.add('is-done');
          cell.classList.remove('is-current');
        });
        foot.hidden = true;
        done.hidden = false;
        restart.focus();
      });

      back.addEventListener('click', function () {
        if (current > 0) {
          current -= 1;
          render();
        }
      });

      restart.addEventListener('click', function () {
        current = 0;
        done.hidden = true;
        foot.hidden = false;
        render();
        next.focus();
      });

      render();
    })();
  </script>
</section>
