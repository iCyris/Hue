<section data-demo="wireframe">
  <style>
    [data-demo="wireframe"] { margin: 0; }
    [data-demo="wireframe"] .wf-canvas { display: block; width: 100%; height: auto; }
    [data-demo="wireframe"] .wf-frame { fill: var(--surface); stroke: var(--border); }
    [data-demo="wireframe"] .wf-block { fill: var(--sand); }
    [data-demo="wireframe"] .wf-block-soft { fill: var(--border-soft); }
    [data-demo="wireframe"] .wf-card { fill: var(--surface); stroke: var(--border); }
    [data-demo="wireframe"] .wf-control { fill: var(--surface); stroke: var(--border-strong); }
    [data-demo="wireframe"] .wf-line { fill: var(--border); }
    [data-demo="wireframe"] .wf-line-soft { fill: var(--border-soft); }
    [data-demo="wireframe"] .wf-text { fill: var(--ink-2); }
    [data-demo="wireframe"] .wf-copy {
      fill: var(--ink-2);
      font-family: var(--serif);
      font-size: 12.5px;
    }
    [data-demo="wireframe"] .wf-copy-strong {
      fill: var(--ink);
      font-family: var(--serif);
      font-size: 12.5px;
      font-weight: 500;
    }
    [data-demo="wireframe"] .wf-copy-muted {
      fill: var(--ink-3);
      font-family: var(--serif);
      font-size: 12px;
    }
    [data-demo="wireframe"] .wf-label {
      fill: var(--ink-3);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.4px;
    }
    [data-demo="wireframe"] .wf-accent { fill: var(--accent-tint); stroke: var(--accent-tint-3); }
  </style>
  <svg class="wf-canvas" viewBox="0 0 600 290" role="img" aria-label="Wireframe: list-detail layout with a sidebar, a list pane, and a detail pane">
    <rect class="wf-frame" x="1" y="1" width="598" height="288" rx="8"/>
    <rect class="wf-block" x="1" y="1" width="598" height="32" rx="8"/>
    <rect class="wf-block" x="1" y="23" width="598" height="10"/>
    <text class="wf-copy-strong" x="16" y="21">Workspace</text>
    <text class="wf-copy-muted" x="550" y="21">Draft</text>
    <text class="wf-copy-muted" x="16" y="58">Navigation</text>
    <rect class="wf-card" x="16" y="72" width="120" height="32" rx="4"/>
    <text class="wf-copy" x="28" y="93">Overview</text>
    <rect class="wf-card" x="16" y="112" width="120" height="32" rx="4"/>
    <text class="wf-copy" x="28" y="133">Activity</text>
    <rect class="wf-card" x="16" y="152" width="120" height="32" rx="4"/>
    <text class="wf-copy" x="28" y="173">Settings</text>
    <text class="wf-copy-muted" x="160" y="58">Items</text>
    <rect class="wf-accent" x="160" y="72" width="184" height="44" rx="6"/>
    <text class="wf-copy-strong" x="172" y="92">Pricing calculator</text>
    <text class="wf-copy-muted" x="172" y="108">Selected item</text>
    <rect class="wf-block-soft" x="160" y="128" width="184" height="32" rx="4"/>
    <rect class="wf-line" x="172" y="141" width="96" height="6" rx="3"/>
    <rect class="wf-block-soft" x="160" y="172" width="184" height="32" rx="4"/>
    <rect class="wf-line" x="172" y="185" width="124" height="6" rx="3"/>
    <text class="wf-copy-muted" x="368" y="58">Selected item</text>
    <text class="wf-copy-strong" x="368" y="84">Pricing calculator</text>
    <text class="wf-copy" x="368" y="108"><tspan x="368">Estimate cost from</tspan><tspan x="368" dy="16">expected usage.</tspan></text>
    <text class="wf-copy-muted" x="368" y="146">Threshold and preview</text>
    <rect class="wf-card" x="368" y="158" width="216" height="48" rx="6"/>
    <rect class="wf-line-soft" x="380" y="172" width="80" height="6" rx="3"/>
    <rect class="wf-line" x="380" y="188" width="148" height="6" rx="3"/>
    <rect class="wf-control" x="368" y="218" width="64" height="24" rx="4"/>
    <text class="wf-copy-strong" x="400" y="235" text-anchor="middle">Review</text>
    <text class="wf-label" x="16" y="274">SIDEBAR</text>
    <text class="wf-label" x="160" y="274">LIST</text>
    <text class="wf-label" x="368" y="274">DETAIL</text>
  </svg>
</section>
